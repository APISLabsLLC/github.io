<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APIS Labs</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --card-bg: #161b22;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid #30363d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.05em;
        }
        .tagline {
            color: var(--accent-color);
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .status-badge {
            display: inline-block;
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-color);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>APIS Labs</h1>
        <div class="tagline">B2B Software & Automation Systems</div>
        <p>We build intelligent data parsing tools, automated workflows, and custom enterprise software components designed to streamline business operations.</p>
        <div class="status-badge">⚡ Core systems deploying soon</div>
    </div>
</body>
</html>
